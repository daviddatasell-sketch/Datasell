<!DOCTYPE html>
<html>
<head>
    <title>Network Diagnostic</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .test { padding: 15px; margin: 10px 0; border-radius: 4px; border-left: 4px solid; }
        .loading { background: #fff3cd; border-color: #ffc107; }
        .success { background: #d4edda; border-color: #28a745; }
        .error { background: #f8d7da; border-color: #dc3545; }
        pre { background: #222; color: #0f0; padding: 10px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🔍 Network Diagnostic</h1>
    <div id="tests"></div>

    <script>
        const testsDiv = document.getElementById('tests');
        const results = {};

        function addTest(name, status, message) {
            const div = document.createElement('div');
            div.className = `test ${status}`;
            div.innerHTML = `<strong>${name}</strong><br>${message}`;
            testsDiv.appendChild(div);
            results[name] = { status, message };
            console.log(`[${status.toUpperCase()}] ${name}: ${message}`);
        }

        // Test 1: Check if we can access external URLs via fetch
        async function testFetch() {
            addTest('Fetch API', 'loading', 'Testing fetch capability...');
            
            try {
                const response = await fetch('https://www.google.com', { mode: 'no-cors' });
                addTest('Fetch API', 'success', 'Fetch works - external requests should work');
            } catch (error) {
                addTest('Fetch API', 'error', `Fetch error: ${error.message}`);
            }
        }

        // Test 2: Try loading Firebase from Google CDN
        async function testGoogleCDN() {
            addTest('Google Firebase CDN', 'loading', 'Attempting to load firebase-app.js...');
            
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
                script.timeout = 5000;
                
                script.onload = () => {
                    addTest('Google Firebase CDN', 'success', 'Firebase CDN loaded successfully!');
                    resolve(true);
                };
                
                script.onerror = () => {
                    addTest('Google Firebase CDN', 'error', 'Failed to load from Google CDN (gstatic.com blocked or unreachable)');
                    resolve(false);
                };
                
                document.head.appendChild(script);
            });
        }

        // Test 3: Check if external image can load
        async function testImageLoad() {
            addTest('Image Load', 'loading', 'Testing if external images load...');
            
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    addTest('Image Load', 'success', 'External images load - CDN access works');
                    resolve(true);
                };
                img.onerror = () => {
                    addTest('Image Load', 'error', 'Cannot load external images - likely network/firewall issue');
                    resolve(false);
                };
                img.src = 'https://www.gstatic.com/images/branding/product/1x/firebase_logo_128dp.png';
            });
        }

        // Run tests
        async function runDiagnostics() {
            console.log('Starting network diagnostics...');
            
            await testFetch();
            await testImageLoad();
            await testGoogleCDN();
            
            addTest('Summary', 'success', `
                <strong>If Firebase CDN failed to load:</strong><br>
                1. Check if gstatic.com is blocked by your firewall/proxy<br>
                2. Try accessing https://www.gstatic.com in your browser<br>
                3. Check if VS Code browser preview has network restrictions<br>
                4. Try using a regular browser (Chrome/Firefox)<br>
                <br>
                <strong>If image load failed:</strong><br>
                Your network blocks external resources. This explains the Firebase CDN issue.
            `);
        }

        runDiagnostics();
    </script>
</body>
</html>
